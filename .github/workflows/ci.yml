# Canonical CI matrix for the Caduceus v1.0 plan.
#
# Implements CONTRACTS.md CI-001 and CI-002. Runs on every pull
# request and every push to main. The matrix runs on stable Rust
# with --locked. The MSRV is documented in Cargo.toml
# (rust-version = "1.97") and enforced at compile time — no
# separate MSRV CI job is needed. The Python gate runs the two
# project-required test files only: tests/hermes_plugin_test.py
# and tests/bridge_test.py. The planning validation step runs
# validate_plan.py from the v1.0 controller tools. Artifacts
# are retained for 14 days.
#
# Required-check names:
# - ci / rust-stable
# - ci / python
# - ci / planning
#
# These names appear in the branch-protection settings; do not
# rename them without coordinating the branch-protection update.
name: ci

on:
  pull_request:
  push:
    branches: [main]
    # The build only fires when Rust, Python, or
    # the workflow files themselves change.
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'AGENTS.md'
      - 'RELEASING.md'
      - 'SECURITY.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - 'MIGRATION.md'
  # Option C: a weekly schedule trigger keeps the cargo and
  # target caches warm so the next human push does not pay the
  # cold-cache build cost (5-10 minutes on ubuntu-24.04 with a
  # minimal rustup profile). The trigger runs the full gate;
  # because the previous run cached its results, the warm run
  # finishes in under two minutes. cron: "0 6 * * 0" is Sunday
  # 06:00 UTC, which is off-peak for the public Actions runner
  # pool.
  schedule:
    - cron: '0 6 * * 0'

# Cancel in-progress runs on the same ref so a force-push does
# not leave a stale runner burning CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-stable:
    name: rust-stable
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install stable Rust
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          # Same rationale as the rust-msrv job: explicit component
          # install keeps the four-line gate reproducible on cold-cache
          # first runs.
          rustup component add rustfmt clippy
      - name: cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-stable-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-stable-
      - name: configure git identity for tests
        run: |
          set -euo pipefail
          git config --global user.email "ci@caduceus.local"
          git config --global user.name "caduceus-ci"
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: test
        run: cargo test --locked --all-targets

  python:
    name: python
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install Python and pytest
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y python3 python3-pip python3-yaml
          # Pin pytest to a known-good version. The system's pre-installed
          # pytest may be a different major version; we want exactly the
          # version we tested against locally (9.0.2) so behavior is
          # identical between local and CI runs.
          python3 -m pip install --break-system-packages --quiet pytest==9.0.2
      - name: run the canonical Python gate
        run: |
          set -euo pipefail
          # Write a JUnit XML next to the runner so the artifact step
          # below can upload it. Without --junit-xml the runner has
          # no test report to surface in the Actions UI.
          python3 -m pytest -q \
            --junit-xml=pytest-junit.xml \
            tests/plugin/ \
            tests/integration/bridge_test.py
      - name: upload pytest junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: pytest-junit.xml
          retention-days: 14
          if-no-files-found: error
