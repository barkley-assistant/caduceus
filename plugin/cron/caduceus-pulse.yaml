# LEGACY SCAFFOLDING — Hermes Agent v0.18.2 does not import this YAML.
# Task 0.2 replaces it with a Bash wrapper under $HERMES_HOME/scripts/ and
# an explicitly reconciled no-agent cron job.
#
# Caduceus pulse — intended fixed cadence
#
# Default: every 2 minutes. The daemon persists ETags and cadence/rate-limit
# metadata across invocations, so idle ticks use conditional requests and
# early invocations exit without contacting GitHub.
#
# Edit the `schedule` field to change cadence. Common alternatives:
#   "every 5m"   — more conservative, fewer API calls
#   "every 1m"   — more aggressive, faster pickup of new labeled issues
#
# The script is the daemon binary at <plugin>/bin/caduceus. Empty
# stdout = silent (per the cron-automation contract).

name: caduceus
schedule: "every 2m"
repeat: forever
deliver: local
script: "../bin/caduceus"
no_agent: true
workdir: "${plugin_root}"
description: "Caduceus poll-and-process tick"
